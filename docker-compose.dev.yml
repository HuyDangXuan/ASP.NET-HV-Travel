services:
  hv-travel-web:
    build:
      target: build
    working_dir: /src
    command: >
      dotnet watch run
      --project HV-Travel.Web/HV-Travel.Web.csproj
      --no-launch-profile
      --urls http://0.0.0.0:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
      - NUGET_PACKAGES=/root/.nuget/packages
      - HVTravelDatabase__ConnectionString=${HVTravelDatabase__ConnectionString}
      - HVTravelDatabase__DatabaseName=HV-Travel
      - Meilisearch__Enabled=true
      - Meilisearch__Url=http://meilisearch:7700
      - Meilisearch__ApiKey=${Meilisearch__ApiKey:-masterKey}
      - Meilisearch__BootstrapOnStartup=true
      - Meilisearch__Indexes__Tours=hv_travel_tours
      - Meilisearch__Indexes__Bookings=hv_travel_bookings
      - Meilisearch__Indexes__Users=hv_travel_users
      - Meilisearch__Indexes__Reviews=hv_travel_reviews
      - Meilisearch__Indexes__ServiceLeads=hv_travel_service_leads
      - Meilisearch__Indexes__Customers=hv_travel_customers
      - Meilisearch__Indexes__Payments=hv_travel_payments
    depends_on:
      - meilisearch
    volumes:
      - .:/src
      - nuget_packages:/root/.nuget/packages
      - hv_travel_web_obj:/src/HV-Travel.Web/obj
      - hv_travel_web_bin:/src/HV-Travel.Web/bin
      - hv_travel_application_obj:/src/HV-Travel.Application/obj
      - hv_travel_application_bin:/src/HV-Travel.Application/bin
      - hv_travel_domain_obj:/src/HV-Travel.Domain/obj
      - hv_travel_domain_bin:/src/HV-Travel.Domain/bin
      - hv_travel_infrastructure_obj:/src/HV-Travel.Infrastructure/obj
      - hv_travel_infrastructure_bin:/src/HV-Travel.Infrastructure/bin

  meilisearch:
    image: getmeili/meilisearch:v1.37
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${Meilisearch__ApiKey:-masterKey}
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch_data:/meili_data

volumes:
  nuget_packages:
  hv_travel_web_obj:
  hv_travel_web_bin:
  hv_travel_application_obj:
  hv_travel_application_bin:
  hv_travel_domain_obj:
  hv_travel_domain_bin:
  hv_travel_infrastructure_obj:
  hv_travel_infrastructure_bin:
  meilisearch_data:
