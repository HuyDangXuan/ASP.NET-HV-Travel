services:
  hv-travel-web:
    image: hv-travel-web
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5028:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - HVTravelDatabase__ConnectionString=${HVTravelDatabase__DockerConnectionString:-mongodb://mongodb:27017}
      - HVTravelDatabase__DatabaseName=HV-Travel
      - Meilisearch__Enabled=true
      - Meilisearch__Url=http://meilisearch:7700
      - Meilisearch__ApiKey=${Meilisearch__ApiKey}
      - Meilisearch__BootstrapOnStartup=true
      - Meilisearch__Indexes__Tours=hv_travel_tours
      - Meilisearch__Indexes__Bookings=hv_travel_bookings
      - Meilisearch__Indexes__Users=hv_travel_users
      - Meilisearch__Indexes__Reviews=hv_travel_reviews
      - Meilisearch__Indexes__ServiceLeads=hv_travel_service_leads
      - Meilisearch__Indexes__Customers=hv_travel_customers
      - Meilisearch__Indexes__Payments=hv_travel_payments
    depends_on:
      mongodb:
        condition: service_started
      meilisearch:
        condition: service_healthy

  mongodb:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  meilisearch:
    image: getmeili/meilisearch:v1.37
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${Meilisearch__ApiKey}
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    restart: unless-stopped
    profiles:
      - tunnel
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN} # Token will be read from .env file
    depends_on:
      - hv-travel-web

volumes:
  mongo_data:
  meilisearch_data:
