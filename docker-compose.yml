services:
  hv-travel-web:
    image: hv-travel-web
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5028:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - HVTravelDatabase__ConnectionString=${HVTravelDatabase__ConnectionString}
      - HVTravelDatabase__DatabaseName=HV-Travel
      - Meilisearch__Enabled=true
      - Meilisearch__Url=http://meilisearch:7700
      - Meilisearch__ApiKey=${Meilisearch__ApiKey:-masterKey}
      - Meilisearch__BootstrapOnStartup=true
      - Meilisearch__Indexes__Tours=hv_travel_tours
      - Meilisearch__Indexes__Bookings=hv_travel_bookings
      - Meilisearch__Indexes__Users=hv_travel_users
      - Meilisearch__Indexes__Reviews=hv_travel_reviews
      - Meilisearch__Indexes__ServiceLeads=hv_travel_service_leads
      - Meilisearch__Indexes__Customers=hv_travel_customers
      - Meilisearch__Indexes__Payments=hv_travel_payments
    depends_on:
      - meilisearch

  mongodb:
    image: mongo:latest
    restart: "no"
    profiles:
      - local-db
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  meilisearch:
    image: getmeili/meilisearch:v1.37
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${Meilisearch__ApiKey:-masterKey}
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch_data:/meili_data

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN} # Token will be read from .env file
    depends_on:
      - hv-travel-web

volumes:
  mongo_data:
  meilisearch_data:
